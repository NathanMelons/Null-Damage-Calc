    <script>
      (function () {
        var lastTheme = null;
        function readHostTheme() {
          var theme = "original";
          try {
            var saved = localStorage.getItem("theme");
            if (saved === "light" || saved === "dark" || saved === "original") {
              theme = saved;
            }
          } catch (e) {}
          if (theme !== lastTheme) {
            lastTheme = theme;
            document.documentElement.setAttribute("data-host-theme", theme);
          }
        }
        readHostTheme();
        setInterval(readHostTheme, 250);
        window.addEventListener("storage", function (event) {
          if (!event || event.key === "theme" || event.key === null) {
            readHostTheme();
          }
        });
      })();
    </script>
